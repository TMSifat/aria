services:
  postgres:
    image: postgres:16-alpine
    container_name: aria_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: aria_db
      POSTGRES_USER: aria
      POSTGRES_PASSWORD: password
    ports:
      # Host 5432 is often taken by a native Postgres; publish on 5433 to avoid
      # the conflict. The connection strings in .env use 5433 to match.
      - '5433:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U aria -d aria_db']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: aria_redis
    restart: unless-stopped
    ports:
      - '6380:6379'
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 3

volumes:
  postgres_data:
  redis_data:
